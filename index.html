<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Ganci</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>🌸 TOKO GANCI 🌸</h1>
    <p>
      Keranjang:
      <span id="jumlah">0</span>
    </p>
  </header>

  <div class="container">

    <div class="card">

      <img src="L-knot.jpeg">

      <h2>Ganci Lucky Knot</h2>

      <p>Rp 15.000</p>

      <button onclick="
        tambah(
          'Ganci Lucky Knot',
          10000,
          'L-knot.jpeg'
        )
      ">
        Tambah
      </button>

    </div>

    <div class="card">

      <img src="B-knot.jpeg">

      <h2>Ganci Chinese Butterfly Knot</h2>

      <p>Rp 10.000</p>

      <button onclick="
        tambah(
          'Ganci Chinese Butterfly Knot',
          10000,
          'B-knot.jpeg'
        )
      ">
        Tambah
      </button>

    </div>

    <div class="card">

      <img src="S2-knot.jpeg">
      
      <img src="S1-knot.jpeg">

      <h2>Ganci Snake Knot</h2>
      
      <p>Rp 10.000</p>

<h3>pesennya bisa milih mau satu tali atau dua tali yaa</h3>
      
      <button onclick="
        tambah(
          'Ganci Snake Knot',
          10000,
          'S2-knot.jpeg'
        )
      ">
        Tambah
      </button>

    </div>

  </div>

  <div class="cart">

    <h2>🛒 Keranjang</h2>

    <ul id="list"></ul>

    <h3>
      Total:
      Rp <span id="total">0</span>
    </h3>

    <button
      class="checkout"
      onclick="checkout()"
    >
      Checkout
    </button>

  </div>

  <div class="review-box">

    <h2>💬 Kasih Ulasan</h2>

    <input
      type="text"
      id="username"
      placeholder="Username kamu"
    >

    <textarea
      id="review"
      placeholder="Tulis ulasan..."
    ></textarea>

    <button onclick="kirimUlasan()">
      Kirim Ulasan
    </button>

  </div>

  <div class="reviews">

    <h2>⭐ Ulasan Pembeli</h2>

    <div id="listReview"></div>

  </div>

  <script src="script.js"></script>

</body>

</html>
